<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Performance & Async Patterns</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #f7f9fc;
            color: #333;
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .input-group {
            margin-bottom: 2rem;
        }

        input[type="text"] {
            padding: 10px 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
            width: 100%;
            max-width: 300px;
            margin-right: 15px;
        }

        button {
            padding: 10px 20px;
            background-color: #0056b3;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background-color: #004494;
        }
    </style>
    <script src="index.js" defer></script>
    <script src="promiseRealAPIsTest.js" defer></script>
</head>

<body>
    <h1>Debounce and Throttle and Promise and Async/Await</h1>
    <div class="input-group">
        <label for="searchInput" style="display:block; margin-bottom:0.5rem; font-weight:bold;">Debounced
            Search:</label>
        <input type="text" id="searchInput" placeholder="Start typing to search...">
    </div>

    <div class="input-group">
        <label style="display:block; margin-bottom:0.5rem; font-weight:bold;">Throttled Action:</label>
        <button id="throttleBtn">Execute Action</button>
    </div>
</body>

</html>
